<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Items</title>
</head>
<body>
    <h1> Shopping cart Using Array</h1>
    <input type="text" id="product">
    <button onclick="addProduct()">Add Product</button>
    <ul id="cart"></ul>

    <script>
        let products=[];
        function addProduct(){
            let item=document.getElementById("product").value.trim();
            products.push(item);

            document.getElementById("cart").innerHTML=products.join("<br>");

            /* let li=document.createElement("li");
             li.innerHTML=item;
             document.getElementById("cart").appendChild(li);*/
              document.getElementById("product").value=""; 
        }
    </script>
    
</body>
</html>

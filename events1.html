<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events1</title>
</head>
<body>
    <h3>Event happened Using the id HTML</h3>

    <input type="text" placeholder="Enter Data" id="input">
    <script>
        const id=document.getElementById('input');
        id.addEventListener("input", function(event)
        {

            console.log(event.target.value);
        });
    </script>
    
</body>
</html>

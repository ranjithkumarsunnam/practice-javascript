<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="calcu.css" />
  </head>
  <body>
    <div class="calculator">
      <h2>JS Calculator</h2>
      <input type="tel" id="num1" placeholder="Enter first number" />
      <input type="tel" id="num2" placeholder="Enter second number" />
      <div class="buttons">
        <button type="submit"id="addBtn">Add</button>
        <button type="submit"id="subBtn">Subtract</button>
      </div>
      <h3>Result: <span id="result">0</span></h3>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
</head>
<body>
    <h3>Event happened using the using Id  </h3>
    <input type="text" id="box" placeholder="enter input field">
    <script>
        const box=document.getElementById("box");
        box.addEventListener("click",function(){
            console.log("Typing.....");
        })  
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Hide Password</title>
     <style>
        .password-box{
            position:relative;
            width:250px;
        }
        .password-box input{
            width:100%;
            padding:10px;

        } 
        .password-box button{
            position:absolute;
            right:0px;
            top:10px;
        }
    </style>
</head>
<body>
    <div class="password-box">
    <input type="password" id="password" placeholder="Password">
    <button onclick="showPassword()">&#x1F441</button>
    </div>
   
    <script>
        function showPassword(){
            let password=document.getElementById("password");
            if(password.type==="password"){
                password.type="text";

            }
            else{
                password.type="password";
            }
        }
    </script>
    
</body>
</html>
